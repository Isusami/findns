name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -o findns-${{ matrix.suffix }} ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: findns-${{ matrix.suffix }}
          path: findns-${{ matrix.suffix }}

  build-slipstream:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: slipstream-client-linux-amd64
            deps: libssl-dev
          - target: x86_64-pc-windows-gnu
            suffix: slipstream-client-windows-amd64.exe
            deps: gcc-mingw-w64-x86-64

    steps:
      - name: Checkout slipstream-rust
        uses: actions/checkout@v4
        with:
          repository: Mygod/slipstream-rust
          path: slipstream-rust
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ${{ matrix.deps }}

      - name: Build slipstream-client
        working-directory: slipstream-rust
        env:
          PICOQUIC_AUTO_BUILD: '1'
          OPENSSL_STATIC: '1'
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          PKG_CONFIG_ALLOW_CROSS: '1'
        run: |
          cargo build --release --target ${{ matrix.target }} -p slipstream-client --features slipstream-ffi/openssl-vendored
          BIN=target/${{ matrix.target }}/release/slipstream-client
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          cp "$BIN" ../${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: ${{ matrix.suffix }}

  release:
    needs: [build, build-slipstream]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
